<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System | foodtravel.group</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #18181b; --accent: #10b981; --bg: #f8fafc; --text-sub: #71717a; }
        * { box-sizing: border-box; font-family: 'Kanit', sans-serif; transition: all 0.3s ease; }
        body { margin: 0; background: var(--bg); color: var(--primary); display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .login-container { 
            background: #fff; padding: 50px; border-radius: 32px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.05); width: 100%; max-width: 420px; text-align: center;
        }
        .login-container h2 { margin-bottom: 10px; font-size: 28px; }
        .login-container p { color: var(--text-sub); margin-bottom: 30px; font-size: 14px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-sub); }
        input { 
            width: 100%; padding: 14px; border-radius: 12px; 
            border: 1px solid #e2e8f0; font-size: 16px; background: #f9fafb;
        }
        input:focus { border-color: var(--accent); outline: none; background: #fff; }

        .btn-login { 
            width: 100%; background: var(--primary); color: #fff; border: none; 
            padding: 16px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 16px;
            margin-top: 10px;
        }
        .btn-login:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }

        .hint { margin-top: 25px; padding: 15px; background: #f1f5f9; border-radius: 12px; font-size: 12px; color: #64748b; line-height: 1.6; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>เข้าสู่ระบบ<span>.</span></h2>
    <p>กรุณากรอกข้อมูลเพื่อเข้าใช้งานระบบ</p>

    <div class="input-group">
        <label>ชื่อผู้ใช้งาน (Username)</label>
        <input type="text" id="username" placeholder="username">
    </div>

    <div class="input-group">
        <label>รหัสผ่าน (Password)</label>
        <input type="password" id="password" placeholder="password">
    </div>

    <button class="btn-login" onclick="handleLogin()">เข้าสู่ระบบ</button>

    <div class="hint">
        <b>Admin:</b> user: admin / pass: 1234 (จัดการระบบ)<br>
        <b>User:</b> user: user / pass: 1234 (จองแพ็กเกจ)
    </div>
    
    <p style="margin-top: 20px;"><a href="index.html" style="color: var(--text-sub); text-decoration: none; font-size: 14px;">← กลับหน้าหลัก</a></p>
</div>

<script>
    function handleLogin() {
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;

        if (pass === "1234") {
            if (user === "admin") {
                // เก็บสถานะ Admin
                localStorage.setItem("userRole", "admin");
                localStorage.setItem("isLoggedIn", "true");
                alert("ยินดีต้อนรับผู้ดูแลระบบ!");
                // นำทางไปหน้า Dashboard (มึงอาจจะสร้างไฟล์ dashboard.html แยก หรือใช้หน้าเดิมก็ได้)
                window.location.href = "admin_dashboard.html"; 
            } else if (user === "user") {
                // เก็บสถานะ User ทั่วไป
                localStorage.setItem("userRole", "user");
                localStorage.setItem("isLoggedIn", "true");
                alert("เข้าสู่ระบบสำเร็จ!");
                window.location.href = "index.html"; 
            } else {
                alert("ไม่พบชื่อผู้ใช้งานนี้ในระบบ!");
            }
        } else {
            alert("รหัสผ่านไม่ถูกต้อง!");
        }
    }

    // กันเหนียว: ถ้าเคย Login แล้วให้เด้งไปหน้าตาม Role เลย
    window.onload = function() {
        if (localStorage.getItem("isLoggedIn") === "true") {
            if (localStorage.getItem("userRole") === "admin") {
                window.location.href = "admin_dashboard.html";
            } else {
                window.location.href = "index.html";
            }
        }
    }
</script>

</body>
</html>
