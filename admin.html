<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin System | foodtravel.group</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #18181b; --accent: #10b981; --danger: #ef4444; --bg: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Kanit', sans-serif; transition: all 0.3s ease; }
        body { margin: 0; background: var(--bg); color: var(--primary); min-height: 100vh; }

        /* --- Login Form Style --- */
        #loginSection { 
            display: flex; justify-content: center; align-items: center; height: 100vh; 
        }
        .login-card { 
            background: #fff; padding: 50px; border-radius: 32px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center;
        }
        .login-card h2 { margin-bottom: 30px; font-size: 28px; }
        .login-card input { 
            width: 100%; padding: 15px; margin-bottom: 15px; 
            border-radius: 12px; border: 1px solid #e2e8f0; font-size: 16px; 
        }
        .btn-login { 
            width: 100%; background: var(--primary); color: #fff; border: none; 
            padding: 15px; border-radius: 12px; cursor: pointer; font-weight: 600; 
        }
        .btn-login:hover { background: var(--accent); }

        /* --- Dashboard Style (Hidden by default) --- */
        #dashboardSection { display: none; }
        .sidebar { width: 280px; background: var(--primary); color: #fff; padding: 40px 20px; position: fixed; height: 100%; }
        .main-content { margin-left: 280px; width: calc(100% - 280px); padding: 40px 5%; }
        /* สไตล์อื่นๆ เหมือนเดิม... */
        .nav-item { padding: 15px; border-radius: 10px; cursor: pointer; margin-bottom: 10px; color: #a1a1aa; text-decoration: none; display: block; }
        .nav-item.active { background: rgba(255,255,255,0.1); color: #fff; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #fff; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; }
        .content-box { background: #fff; border-radius: 24px; padding: 30px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #f1f5f9; }
        .status-badge { padding: 5px 12px; border-radius: 50px; font-size: 12px; font-weight: 600; background: #fef3c7; color: #d97706; }
    </style>
</head>
<body>

<div id="loginSection">
    <div class="login-card">
        <h2>Admin Login<span>.</span></h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-login" onclick="handleLogin()">Login</button>
        <p style="margin-top: 20px; font-size: 14px;"><a href="index.html" style="color: var(--text-sub); text-decoration: none;">← กลับหน้าหลัก</a></p>
    </div>
</div>

<div id="dashboardSection">
    <div class="sidebar">
        <h2 style="font-size: 20px; margin-bottom: 40px;">foodtravel<span>.</span>admin</h2>
        <div class="nav-item active">จัดการการจอง</div>
        <div class="nav-item">จัดการแพ็กเกจ</div>
        <a href="index.html" class="nav-item" style="margin-top: 50px; color: #ef4444;">← ออกจากระบบ</a>
    </div>

    <div class="main-content">
        <h1 style="margin-bottom: 40px;">Dashboard Overview<span>.</span></h1>
        
        <div class="stats-grid">
            <div class="stat-card"><h4>ยอดจองทั้งหมด</h4><p style="font-size: 28px; font-weight: 600;">12 รายการ</p></div>
            <div class="stat-card"><h4>รายได้รวม</h4><p style="font-size: 28px; font-weight: 600;">฿1,548,000</p></div>
            <div class="stat-card"><h4>Active Packages</h4><p style="font-size: 28px; font-weight: 600;">8</p></div>
        </div>

        <div class="content-box">
            <h3>รายการจองล่าสุด (Real-time)</h3>
            <table>
                <thead>
                    <tr><th>วันที่</th><th>แพ็กเกจ</th><th>สถานะ</th><th>การจัดการ</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td>2026-04-03</td>
                        <td>The Peak of Switzerland</td>
                        <td><span class="status-badge">Pending</span></td>
                        <td><button onclick="alert('ยืนยันแล้ว')">ยืนยัน</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ตรวจเช็คสถานะตอนโหลดหน้า
    window.onload = function() {
        if (localStorage.getItem("userRole") === "admin") {
            showDashboard();
        }
    }

    function handleLogin() {
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;

        // เช็ค Username / Password แบบ Simple
        if (user === "admin" && pass === "1234") {
            localStorage.setItem("userRole", "admin");
            localStorage.setItem("isLoggedIn", "true");
            showDashboard();
        } else {
            alert("Username หรือ Password ผิดไอสัส! ลองใหม่");
        }
    }

    function showDashboard() {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("dashboardSection").style.display = "block";
        document.body.style.display = "flex"; // ปรับ Layout ให้ Sidebar ทำงาน
    }
</script>

</body>
</html>
