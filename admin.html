<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | foodtravel.group</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #18181b; 
            --accent: #10b981; 
            --text-sub: #71717a; 
            --bg-soft: #f4f4f5; 
        }
        * { box-sizing: border-box; font-family: 'Kanit', sans-serif; transition: all 0.25s ease; }
        body { 
            margin: 0; 
            background: radial-gradient(circle at top right, #ecfdf5, #ffffff); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .login-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #e4e4e7;
        }

        .logo { font-weight: 700; font-size: 24px; margin-bottom: 30px; text-transform: lowercase; }
        .logo span { color: var(--accent); }

        h2 { margin-bottom: 10px; font-size: 22px; color: var(--primary); }
        p { color: var(--text-sub); font-size: 14px; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 8px; color: var(--primary); font-weight: 500; }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #e4e4e7;
            background: var(--bg-soft);
            outline: none;
        }
        .input-group input:focus { border-color: var(--accent); background: #fff; }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-login:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }

        .back-home { margin-top: 25px; display: block; text-decoration: none; color: var(--text-sub); font-size: 13px; }
        .back-home:hover { color: var(--primary); }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">foodtravel<span>.</span>group</div>
    <h2>ยินดีต้อนรับกลับ</h2>
    <p>กรุณาเข้าสู่ระบบเพื่อจัดการหลังบ้าน (Dashboard)</p>

    <form>
        <div class="input-group">
            <label>ชื่อผู้ใช้งาน (Username)</label>
            <input type="text" placeholder="ระบุชื่อผู้ใช้งาน" value="First_Admin">
        </div>
        <div class="input-group">
            <label>รหัสผ่าน (Password)</label>
            <input type="password" placeholder="ระบุรหัสผ่าน">
        </div>
        
        <button type="button" class="btn-login" onclick="alert('Login Success! กำลังพาไปหน้า Dashboard'); location.href='index.html'">เข้าสู่ระบบ</button>
    </form>

    <a href="index.html" class="back-home">← กลับไปหน้าแรก</a>
</div>

</body>
</html>
