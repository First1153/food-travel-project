<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking | foodtravel.group</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #18181b; --accent: #10b981; --text-sub: #71717a; --bg-soft: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Kanit', sans-serif; transition: all 0.3s ease; }
        body { margin: 0; background: var(--bg-soft); color: var(--primary); }

        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 8%; border-bottom: 1px solid #e2e8f0; 
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
        }
        .logo { font-weight: 700; font-size: 22px; text-decoration: none; color: var(--primary); }
        .logo span { color: var(--accent); }

        .container { padding: 60px 8%; display: flex; justify-content: center; }
        .booking-card { 
            background: #fff; padding: 40px; border-radius: 30px; 
            max-width: 700px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }
        h2 { font-size: 32px; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 400; color: var(--text-sub); }
        input, select, textarea { 
            width: 100%; padding: 14px; border-radius: 12px; 
            border: 1px solid #e2e8f0; background: #fff; font-size: 16px; 
        }
        input:focus { border-color: var(--accent); outline: none; }

        .btn-submit { 
            width: 100%; background: var(--primary); color: #fff; border: none; 
            padding: 18px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 18px;
        }
        .btn-submit:hover { background: var(--accent); transform: translateY(-2px); }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">foodtravel<span>.</span>group</a>
</nav>

<div class="container">
    <div class="booking-card">
        <h2>จองแพ็กเกจท่องเที่ยว<span>.</span></h2>
        <form id="bookingForm">
            <div class="form-group">
                <label>เลือกแพ็กเกจ</label>
                <select id="packageSelect">
                    <option value="swiss">The Peak of Switzerland</option>
                    <option value="moritz">St. Moritz Grand Tour</option>
                </select>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>วันที่เดินทาง</label>
                    <input type="date" required>
                </div>
                <div class="form-group">
                    <label>จำนวนผู้เดินทาง (ท่าน)</label>
                    <input type="number" min="1" value="1" required>
                </div>
            </div>
            <div class="form-group">
                <label>ข้อมูลติดต่อเพิ่มเติม / ความต้องการพิเศษ</label>
                <textarea rows="4" placeholder="เช่น แพ้อาหาร หรือต้องการเตียงเสริม..."></textarea>
            </div>
            <button type="button" class="btn-submit" onclick="confirmBooking()">ยืนยันการจอง</button>
        </form>
    </div>
</div>

<script>
    function confirmBooking() {
        alert("ได้รับข้อมูลการจองเรียบร้อยแล้ว! เจ้าหน้าที่จะติดต่อกลับเพื่อยืนยันภายใน 24 ชม.");
        window.location.href = "index.html";
    }
</script>

</body>
</html>
