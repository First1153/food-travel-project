<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gourmet | foodtravel.group</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #18181b; --accent: #10b981; --text-sub: #71717a; --bg-soft: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Kanit', sans-serif; transition: all 0.3s ease; }
        body { margin: 0; background: #fff; color: var(--primary); }

        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 8%; border-bottom: 1px solid #e2e8f0; 
            position: sticky; top: 0; background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(15px); z-index: 1000; 
        }
        .logo { font-weight: 700; font-size: 22px; text-transform: lowercase; text-decoration: none; color: var(--primary); }
        .logo span { color: var(--accent); }
        .nav-links a { text-decoration: none; color: var(--text-sub); margin-left: 25px; font-size: 14px; }
        .nav-links a:hover { color: var(--accent); }

        .container { padding: 60px 8%; max-width: 1400px; margin: auto; }
        h2 { font-size: 42px; margin-bottom: 30px; letter-spacing: -1px; }
        h2 span { color: var(--accent); }

        .banner { 
            width: 100%; height: 500px; border-radius: 40px; 
            object-fit: cover; margin-bottom: 60px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); 
        }

        .food-info { 
            display: flex; gap: 60px; align-items: center; 
            margin-top: 40px; background: var(--bg-soft);
            padding: 50px; border-radius: 40px;
        }
        .food-text { flex: 1; }
        .food-text h3 { font-size: 32px; margin-bottom: 20px; }
        .food-text p { color: var(--text-sub); line-height: 1.8; font-size: 18px; }
        
        .food-img { 
            flex: 1; height: 450px; border-radius: 30px; 
            object-fit: cover; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        @media (max-width: 968px) {
            .food-info { flex-direction: column; padding: 30px; }
            .banner { height: 300px; }
            .food-img { width: 100%; height: 300px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">foodtravel<span>.</span>group</a>
    <div class="nav-links">
        <a href="index.html">หน้าแรก</a>
        <a href="packages.html">แพ็กเกจทัวร์</a>
        <a href="food.html">ร้านอาหาร</a>
        <a href="contact.html">จอง & ติดต่อ</a>
        <a href="team.html">ทีมงาน</a>
    </div>
</nav>

<div class="container">
    <h2>Gourmet Destinations<span>.</span></h2>
    
    <img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=1200&auto=format&fit=crop" class="banner" alt="Luxury Dining View">
    
    <div class="food-info">
        <div class="food-text">
            <h3>The Michelin Peak</h3>
            <p>ร้านอาหารระดับ 3 ดาวมิชลินที่ตั้งอยู่บนจุดชมวิวที่สูงที่สุดในเทือกเขาแอลป์ รังสรรค์เมนูจากวัตถุดิบ Organic ส่งตรงจากฟาร์มท้องถิ่น ให้คุณได้ดื่มด่ำกับรสชาติท่ามกลางทะเลหมอก</p>
        </div>
        <img src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0?q=80&w=800&auto=format&fit=crop" class="food-img" alt="Fine Dining Dish">
    </div>
</div>

</body>
</html>
