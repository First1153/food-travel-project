<div class="container" style="padding: 60px 10%;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
        
        <div class="card">
            <h2 style="color: #1a4d7c; margin-top: 0;">จองแพ็กเกจ / ติดต่อเรา</h2>
            <form action="#" style="display: flex; flex-direction: column; gap: 15px;">
                <div>
                    <label>ชื่อ-นามสกุล</label><br>
                    <input type="text" placeholder="ระบุชื่อของคุณ" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                </div>
                <div>
                    <label>อีเมลติดต่อ</label><br>
                    <input type="email" placeholder="example@mail.com" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                </div>
                <div>
                    <label>เลือกบริการที่สนใจ</label><br>
                    <select style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                        <option>จองร้านอาหาร</option>
                        <option>จองทัวร์ท่องเที่ยว</option>
                        <option>สอบถามข้อมูลเพิ่มเติม</option>
                    </select>
                </div>
                <div>
                    <label>ข้อความเพิ่มเติม</label><br>
                    <textarea rows="4" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd;"></textarea>
                </div>
                <button type="button" class="btn-search" style="width: 100%;">ส่งข้อมูลการจอง</button>
            </form>
        </div>

        <div>
            <h3 style="color: #1a4d7c;">ช่องทางการติดต่ออื่นๆ</h3>

            <p><strong>โทร:</strong> 08X-XXX-XXXX</p>
            <p><strong>Email:</strong> [ใส่เมลเฟิร์ส]@student.com</p>
            <div style="margin-top: 20px;">
                <h4 style="color: #ff6b35;">เวลาทำการ</h4>
                <p>จันทร์ - ศุกร์: 09:00 - 18:00 น.<br>เสาร์ - อาทิตย์: 10:00 - 16:00 น.</p>
            </div>
            <div style="background: #eee; height: 150px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #888;">
                [ Google Maps Simulator ]
            </div>
        </div>

    </div>
</div>
