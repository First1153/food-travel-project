<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | foodtravel.group</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #18181b; 
            --accent: #10b981; 
            --text-sub: #71717a; 
            --bg-soft: #f4f4f5; 
        }
        * { box-sizing: border-box; font-family: 'Kanit', sans-serif; transition: all 0.25s ease; }
        body { margin: 0; background: #fff; color: var(--primary); }

        /* Navbar Style */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 8%; border-bottom: 1px solid #e4e4e7; 
            position: sticky; top: 0; background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(15px); z-index: 1000; 
        }
        .logo { font-weight: 700; font-size: 22px; text-transform: lowercase; text-decoration: none; color: var(--primary); }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-sub); margin-left: 25px; font-size: 14px; }
        .nav-links a:hover { color: var(--accent); }
        
        /* สไตล์ปุ่ม Login / Logout */
        .btn-auth { background: var(--primary); color: #fff !important; padding: 8px 20px; border-radius: 8px; margin-left: 25px; cursor: pointer; border: none; }
        .btn-logout { background: #ef4444; }

        /* Content Style */
        .container { 
            padding: 80px 8%; 
            background: radial-gradient(circle at bottom left, #ecfdf5, #fff); 
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card { 
            background: #fff; padding: 50px; border-radius: 32px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.05); 
            max-width: 600px; width: 100%; border: 1px solid #e4e4e7;
        }
        h3 { font-size: 32px; margin-top: 0; margin-bottom: 10px; }
        h3 span { color: var(--accent); }
        
        form { display: flex; flex-direction: column; gap: 20px; margin-top: 35px; }
        input, textarea { 
            padding: 16px; border-radius: 12px; border: 1px solid #e4e4e7; 
            background: var(--bg-soft); outline: none; font-size: 16px; width: 100%;
        }
        input:focus, textarea:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        
        .btn-action { 
            background: var(--primary); color: #fff; border: none; 
            padding: 18px; border-radius: 12px; cursor: pointer; 
            font-weight: 600; font-size: 16px; margin-top: 10px;
        }
        .btn-action:hover { background: var(--accent); transform: translateY(-3px); box-shadow: 0 15px 30px rgba(16, 185, 129, 0.25); }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">foodtravel<span>.</span>group</a>
    <div class="nav-links">
        <a href="index.html">หน้าแรก</a>
        <a href="packages.html">แพ็กเกจทัวร์</a>
        <a href="food.html">ร้านอาหาร</a>
        <a href="contact.html">จอง & ติดต่อ</a>
        <a href="team.html">ทีมงาน</a>
        
        <a href="#" id="adminBadge" style="display: none; color: var(--accent); font-weight: 600;">[Admin Mode]</a>
        
        <a href="admin.html" id="loginBtn" class="btn-auth">Login</a>
        <button id="logoutBtn" class="btn-auth btn-logout" style="display: none;" onclick="handleLogout()">Logout</button>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h3>ติดต่อสอบถาม<span>.</span></h3>
        <p style="color: var(--text-sub); font-size: 15px;">กรุณากรอกข้อมูลด้านล่าง ทีมงาน Alpine Luxury จะติดต่อกลับหาคุณโดยเร็วที่สุด</p>
        
        <form id="contactForm">
            <input type="text" id="senderName" placeholder="ชื่อของคุณ" required>
            <input type="email" id="senderEmail" placeholder="อีเมลสำหรับติดต่อ" required>
            <textarea id="message" placeholder="คุณสนใจเส้นทางในสวิตเซอร์แลนด์ หรือต้องการสอบถามเรื่องใด?" rows="5" required></textarea>
            <button type="button" class="btn-action" onclick="sendInquiry()">ส่งข้อความ</button>
        </form>
    </div>
</div>

<script>
    // --- ระบบ Role Check ---
    const role = localStorage.getItem("userRole");
    const isLoggedIn = localStorage.getItem("isLoggedIn");

    if (isLoggedIn === "true") {
        document.getElementById("loginBtn").style.display = "none";
        document.getElementById("logoutBtn").style.display = "block";
        
        if (role === "admin") {
            document.getElementById("adminBadge").style.display = "block";
        }
    }

    function handleLogout() {
        localStorage.clear();
        alert("ออกจากระบบเรียบร้อย");
        window.location.href = "index.html";
    }

    // --- ระบบฟอร์ม ---
    function sendInquiry() {
        const name = document.getElementById("senderName").value;
        if(name) {
            alert(`ขอบคุณครับคุณ ${name}! ข้อความของคุณถูกส่งไปยังทีมงาน Alpine Luxury เรียบร้อยแล้ว`);
            document.getElementById("contactForm").reset();
        } else {
            alert("กรุณากรอกข้อมูลให้ครบถ้วน");
        }
    }
</script>

</body>
</html>
