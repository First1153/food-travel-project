<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | foodtravel.group</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #18181b; 
            --accent: #10b981; 
            --text-sub: #71717a; 
            --bg-soft: #f4f4f5; 
        }
        * { box-sizing: border-box; font-family: 'Kanit', sans-serif; transition: all 0.25s ease; }
        body { margin: 0; background: #fff; color: var(--primary); }

        /* Navbar Style */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 8%; border-bottom: 1px solid #e4e4e7; 
            position: sticky; top: 0; background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(10px); z-index: 1000; 
        }
        .logo { font-weight: 700; font-size: 22px; text-transform: lowercase; text-decoration: none; color: var(--primary); }
        .logo span { color: var(--accent); }
        .nav-links a { text-decoration: none; color: var(--text-sub); margin-left: 25px; font-size: 14px; }
        .nav-links a:hover { color: var(--accent); }
        .btn-login { background: var(--primary); color: #fff !important; padding: 8px 20px; border-radius: 6px; }

        /* Content Style */
        .container { padding: 80px 8%; background: radial-gradient(circle at bottom left, #ecfdf5, #fff); min-height: calc(100vh - 80px); }
        .card { 
            background: #fff; padding: 40px; border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.05); 
            max-width: 600px; margin: auto; border: 1px solid #e4e4e7;
        }
        h3 { font-size: 28px; margin-top: 0; }
        h3 span { color: var(--accent); }
        
        form { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        input, textarea { 
            padding: 14px; border-radius: 10px; border: 1px solid #e4e4e7; 
            background: var(--bg-soft); outline: none; font-size: 15px;
        }
        input:focus, textarea:focus { border-color: var(--accent); background: #fff; }
        
        .btn-action { 
            background: var(--primary); color: #fff; border: none; 
            padding: 15px; border-radius: 10px; cursor: pointer; 
            font-weight: 600; font-size: 16px; margin-top: 10px;
        }
        .btn-action:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">foodtravel<span>.</span>group</a>
    <div class="nav-links">
        <a href="index.html">หน้าแรก</a>
        <a href="packages.html">แพ็กเกจทัวร์</a>
        <a href="food.html">ร้านอาหาร</a>
        <a href="contact.html">จอง & ติดต่อ</a>
        <a href="team.html">ทีมงาน</a>
        <a href="admin.html" class="btn-login">Login</a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h3>ติดต่อสอบถาม<span>.</span></h3>
        <p style="color: var(--text-sub); font-size: 14px;">กรุณากรอกข้อมูลด้านล่าง เจ้าหน้าที่จะติดต่อกลับหาคุณโดยเร็วที่สุด</p>
        
        <form>
            <input type="text" placeholder="ชื่อของคุณ">
            <input type="email" placeholder="อีเมล">
            <textarea placeholder="ข้อความที่ต้องการสอบถามหรือรายละเอียดการจอง" rows="5"></textarea>
            <button type="button" class="btn-action" onclick="alert('ส่งข้อความเรียบร้อย! เราจะรีบติดต่อกลับครับ')">ส่งข้อความ</button>
        </form>
    </div>
</div>

</body>
</html>
