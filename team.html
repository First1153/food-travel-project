<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team | foodtravel.group</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #18181b; 
            --accent: #10b981; 
            --text-sub: #71717a; 
            --bg-soft: #f4f4f5; 
        }
        * { box-sizing: border-box; font-family: 'Kanit', sans-serif; transition: all 0.25s ease; }
        body { margin: 0; background: #fff; color: var(--primary); }

        /* Navbar Style */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 8%; border-bottom: 1px solid #e4e4e7; 
            position: sticky; top: 0; background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(10px); z-index: 1000; 
        }
        .logo { font-weight: 700; font-size: 22px; text-transform: lowercase; text-decoration: none; color: var(--primary); }
        .logo span { color: var(--accent); }
        .nav-links a { text-decoration: none; color: var(--text-sub); margin-left: 25px; font-size: 14px; }
        .nav-links a:hover { color: var(--accent); }
        .btn-login { background: var(--primary); color: #fff !important; padding: 8px 20px; border-radius: 6px; }

        /* Team Card Style */
        .container { 
            padding: 80px 8%; 
            text-align: center; 
            background: radial-gradient(circle at top left, #f0fdf4, #ffffff);
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card { 
            background: #ffffff; 
            padding: 50px; 
            border-radius: 32px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.05); 
            max-width: 500px; 
            width: 100%;
            margin: auto; 
            border: 1px solid #e4e4e7;
        }
        h2 { font-size: 32px; margin-bottom: 10px; color: var(--primary); }
        h2 span { color: var(--accent); }
        
        .profile-info { text-align: left; margin-top: 30px; }
        .profile-info p { margin: 12px 0; font-size: 16px; color: var(--primary); }
        .profile-info strong { color: var(--text-sub); font-weight: 400; min-width: 100px; display: inline-block; }
        
        .member-block { margin-bottom: 25px; }
        .project-tag { 
            font-size: 14px; 
            color: var(--text-sub); 
            background: var(--bg-soft); 
            padding: 10px 20px; 
            border-radius: 50px;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">foodtravel<span>.</span>group</a>
    <div class="nav-links">

        <a href="team.html">ทีมงาน</a>
        <a href="admin.html" class="btn-login">Login</a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h2>Developer Profile<span>.</span></h2>
        
        <div class="profile-info">
            <div class="member-block">
                <p><strong>ชื่อ-นามสกุล:</strong> ธนบดี สันติสงคราม</p>
                <p><strong>รหัสนักศึกษา:</strong> 1660705391</p>
                <p><strong>เลขที่:</strong> 26</p>
            </div>

            <hr style="border: 0; border-top: 1px solid #e4e4e7; margin: 25px 0;">

            <div class="member-block">
                <p><strong>ชื่อ-นามสกุล:</strong> กานต์นที ถีเจริญ</p>
                <p><strong>รหัสนักศึกษา:</strong> 1660704808</p>
                <p><strong>เลขที่:</strong> 20</p>
            </div>

            <div style="text-align: center;">
                <span class="project-tag">Project: Cloud Business Group</span>
            </div>
        </div>
    </div>
</div>

</body>
</html>
